<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Book body -->
  <rect x="12" y="14" width="40" height="38" rx="3" fill="#3b2a1a" stroke="#8b6914" stroke-width="2"/>
  <!-- Spine -->
  <rect x="12" y="14" width="6" height="38" rx="2" fill="#2a1a0a" stroke="#8b6914" stroke-width="1.5"/>
  <!-- Pages -->
  <rect x="20" y="18" width="28" height="30" rx="1" fill="#f5e6c8"/>
  <rect x="20" y="18" width="28" height="30" rx="1" fill="none" stroke="#d4b896" stroke-width="0.5"/>
  <!-- Page lines -->
  <line x1="24" y1="24" x2="44" y2="24" stroke="#c4a878" stroke-width="0.8"/>
  <line x1="24" y1="28" x2="44" y2="28" stroke="#c4a878" stroke-width="0.8"/>
  <line x1="24" y1="32" x2="44" y2="32" stroke="#c4a878" stroke-width="0.8"/>
  <line x1="24" y1="36" x2="40" y2="36" stroke="#c4a878" stroke-width="0.8"/>
  <!-- Musical note decoration on cover center -->
  <circle cx="34" cy="40" r="2.5" fill="#8b6914"/>
  <line x1="36.5" y1="40" x2="36.5" y2="31" stroke="#8b6914" stroke-width="1.5"/>
  <path d="M36.5 31 Q40 29 38 33" fill="#8b6914"/>
  <!-- Glow effect -->
  <ellipse cx="32" cy="33" rx="22" ry="22" fill="url(#glow)" opacity="0.3"/>
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
