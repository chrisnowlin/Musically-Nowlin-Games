  <line x1="24" y1="40" x2="40" y2="40" stroke="#6D28D9" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="44" x2="40" y2="44" stroke="#6D28D9" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="48" x2="40" y2="48" stroke="#6D28D9" stroke-width="1.5" stroke-linecap="round"/>
